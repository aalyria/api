syntax = "proto3";

package aalyria.spacetime.tools.nbictl;

import "google/protobuf/empty.proto";

option go_package = "aalyria.com/spacetime/tools/nbictl/nbictlpb";

message AppConfig {
  repeated Config configs = 1;
}

message Config {
  string name = 1;
  // deprecated, use auth_strategy
  string key_id = 2 [deprecated=true];
  // deprecated, use auth_strategy
  string email = 3 [deprecated=true];
  // deprecated, use auth_strategy
  string priv_key = 4 [deprecated=true];
  string url = 5;

  message TransportSecurity {
    message ServerCertificate {
      string cert_file_path = 1;
    }

    oneof type {
      // Don't use TLS, connect using plain-text HTTP/2.
      google.protobuf.Empty insecure = 1;

      // Use the system certificate pool for TLS.
      google.protobuf.Empty system_cert_pool = 2;

      // Use the provided server certificate for TLS.
      ServerCertificate server_certificate = 3;
    }
  }

  message Transport {
    oneof type {
      // Use TCP (default when transport is unset).
      google.protobuf.Empty tcp = 1;
      // Use QUIC/UDP. Requires TLS (incompatible with
      // insecure transport_security).
      google.protobuf.Empty quic = 2;
    }
  }

  // A strategy for signing a JWT.
  message SigningStrategy {
    oneof type {
      // The bytes of a PEM-encoded RSA private key in
      // PKCS #1, ASN.1 DER form or in (unencrypted)
      // PKCS #8, ASN.1 DER form.
      bytes private_key_bytes = 1;
      // The path to a PEM-encoded RSA private key in PKCS #1, ASN.1 DER form or
      // in (unencrypted) PKCS #8, ASN.1 DER form.
      string private_key_file = 2;
    }
  }

  message AuthStrategy {
    // Jwt is a JSON web token. See https://jwt.io/introduction for more
    // information.
    message Jwt {
      string email = 1;
      string audience = 2;
      string private_key_id = 3;
      SigningStrategy signing_strategy = 4;
    }

    // OidcClientCredentials exchanges a signed JWT assertion at an OIDC token
    // endpoint using the client_credentials grant type, and uses the returned
    // access token for authentication.
    message OidcClientCredentials {
      string client_id = 1;
      string token_url = 2;
      string private_key_id = 3;
      SigningStrategy signing_strategy = 4;
    }

    oneof type {
      // The specifications for a JWT that should be generated and signed by the
      // agent.
      Jwt jwt = 1;

      // No authentication options should be used. This is unlikely to work for
      // you.
      google.protobuf.Empty none = 2;

      // OIDC client_credentials token exchange.
      OidcClientCredentials oidc_client_credentials = 3;
    }
  }

  // Describes how to connect to a single gRPC service endpoint.
  message ServiceEndpoint {
    // The host[:port] for this service. Required.
    string url = 1;

    // Optional overrides. When unset, inherits from the parent Config.
    TransportSecurity transport_security = 2;
    Transport transport = 3;
    AuthStrategy auth_strategy = 4;
  }

  // Per-service endpoint overrides for custom mode.
  message CustomEndpoints {
    ServiceEndpoint model = 1;
    ServiceEndpoint status = 2;
    ServiceEndpoint provisioning = 3;

    // Fallback for services not explicitly listed
    // (e.g. grpcurl --api=<arbitrary>). When unset, falls back to the
    // parent Config's url with no subdomain prefix.
    ServiceEndpoint default = 4;
  }

  // Describes endpoint resolution strategy.
  message EndpointConfig {
    oneof strategy {
      // Each service is at <subdomain>.<url>.
      // This is the default when endpoint_config is unset.
      google.protobuf.Empty subdomain = 1;

      // All services share a single URL. When url is set, it overrides
      // the parent Config's url. Other fields override when set.
      ServiceEndpoint single_domain = 2;

      // Each service has an independently specified endpoint.
      CustomEndpoints custom = 3;
    }
  }

  TransportSecurity transport_security = 7;
  // The transport protocol to use. Defaults to TCP if unset.
  Transport transport = 8;
  // The strategy to use for authorization. Required.
  AuthStrategy auth_strategy = 9;
  EndpointConfig endpoint_config = 10;
}
